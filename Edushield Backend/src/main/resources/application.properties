spring.application.name=education

# Server Configuration
server.port=8080

# H2 - AUTO_SERVER=TRUE allows multiple JVM connections simultaneously (prevents file lock error)
# Note: AUTO_SERVER=TRUE is incompatible with DB_CLOSE_ON_EXIT=FALSE and DB_CLOSE_DELAY=-1
spring.datasource.url=jdbc:h2:file:./data/child_insurance_db;AUTO_SERVER=TRUE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password

# Connection Pool - keep connection alive to prevent lock release
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# JPA / Hibernate - update preserves data, never drops tables
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# SQL Schema Patch - adds missing columns safely
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema-patch.sql
spring.jpa.defer-datasource-initialization=true

# Disable DevTools - prevents restart loop that causes DB lock
spring.devtools.restart.enabled=false
spring.devtools.livereload.enabled=false

# Enable H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=false

# Swagger/OpenAPI
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html

# JWT Configuration
app.jwt.secret=MjRhNDI1NmI3ODljZDRlNWYzYjEwN2EyZDMwZWY4NjU5ZjcwYTFiYzc4OTBkZTQxNTQ3ZWY5MzJhODE3YzkyNQ==
